<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运大转盘抽奖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'SimHei', sans-serif;
            background: url('background.jpg') no-repeat left top;
            background-size: cover;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .main-container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 80px 30px 30px;
        }
        .title-section { text-align: center; margin-bottom: 5px; }
        .title-section h1 {
            font-size: 52px; color: #ffd700;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.3);
            letter-spacing: 8px;
        }
        .title-section .subtitle {
            font-size: 18px; color: #ffe4b5; margin-top: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }
        .round-info {
            text-align: center; font-size: 28px; color: #ffd700;
            margin: 8px 0 10px; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); font-weight: bold;
        }
        .wheels-container {
            display: flex; justify-content: center; align-items: flex-start;
            gap: 30px; padding: 10px 0; flex-wrap: nowrap;
        }
        .wheel-section { text-align: center; flex-shrink: 1; min-width: 0; }
        .wheel-section h2 {
            font-size: 28px; color: #ffd700; margin-bottom: 10px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }
        .wheel-section canvas { max-width: 100%; height: auto; }
        .wheel-section-number { flex-shrink: 0; }
        .wheel-wrapper { position: relative; display: inline-block; }
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 40px solid #ffd700; z-index: 10;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }
        .pointer::after {
            content: ''; position: absolute; top: -42px; left: -13px;
            width: 0; height: 0;
            border-left: 13px solid transparent; border-right: 13px solid transparent;
            border-top: 25px solid #fff8dc;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.3), 0 0 80px rgba(255,215,0,0.15);
        }
        .wheel-section-number {
            align-self: flex-start;
            margin-top: 0;
        }
        .wheel-section-number h2 { font-size: 22px; }
        .pointer-small {
            border-left: 12px solid transparent !important;
            border-right: 12px solid transparent !important;
            border-top: 24px solid #ffd700 !important;
            top: -6px !important;
        }
        .pointer-small::after {
            top: -26px !important; left: -8px !important;
            border-left: 8px solid transparent !important;
            border-right: 8px solid transparent !important;
            border-top: 16px solid #fff8dc !important;
        }

        /* 本轮已选奖品 */
        .spin-prizes {
            text-align: center;
            min-height: 40px;
            margin: 10px 0;
        }
        .spin-prize-tag {
            display: inline-block;
            background: rgba(139,0,0,0.7);
            border: 2px solid #ffd700;
            border-radius: 25px;
            padding: 8px 20px;
            margin: 4px 8px;
            font-size: 18px;
            color: #ffd700;
            animation: tagPop 0.4s ease;
        }
        @keyframes tagPop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-container { text-align: center; margin: 15px 0; }
        #spinBtn {
            font-size: 30px; padding: 14px 70px;
            background: linear-gradient(to bottom, #ffd700, #daa520);
            color: #8b0000; border: 3px solid #fff8dc; border-radius: 50px;
            cursor: pointer; font-family: inherit; font-weight: bold;
            letter-spacing: 8px; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), 0 0 20px rgba(255,215,0,0.3);
        }
        #spinBtn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 30px rgba(255,215,0,0.5);
        }
        #spinBtn:disabled {
            background: linear-gradient(to bottom, #999, #777);
            color: #555; border-color: #aaa; cursor: not-allowed; box-shadow: none;
        }
        #resetBtn {
            font-size: 18px; padding: 10px 30px; margin-left: 20px;
            background: rgba(255,255,255,0.15); color: #ffd700;
            border: 2px solid rgba(255,215,0,0.5); border-radius: 30px;
            cursor: pointer; font-family: inherit; font-weight: bold;
            letter-spacing: 3px; transition: all 0.3s; vertical-align: middle;
        }
        #resetBtn:hover { background: rgba(255,255,255,0.25); }

        /* 信息面板 */
        .info-panel {
            max-width: 1200px; margin: 15px auto;
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
        }
        .info-box {
            background: rgba(100,0,0,0.5);
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 12px; padding: 15px 20px;
            backdrop-filter: blur(5px); flex: 1; min-width: 300px;
        }
        .info-box h3 {
            color: #ffd700; font-size: 18px; margin-bottom: 10px;
            text-align: center; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 8px;
        }
        .table-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .table-tag {
            display: inline-block; padding: 6px 14px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; font-size: 15px; color: #fff; transition: all 0.3s;
        }
        .table-tag.used {
            background: rgba(100,100,100,0.4); color: #888;
            text-decoration: line-through; border-color: rgba(100,100,100,0.4);
        }
        .table-tag.used::after { content: ' ✓'; color: #ffd700; }
        .prize-list { list-style: none; }
        .prize-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px; transition: all 0.3s;
        }
        .prize-item:last-child { border-bottom: none; }
        .prize-item.exhausted { color: #888; text-decoration: line-through; }
        .prize-item .prize-label { flex: 1; }
        .prize-item .prize-sponsor { color: rgba(255,255,255,0.5); font-size: 12px; margin-left: 5px; }
        .prize-item .prize-qty { min-width: 80px; text-align: right; font-weight: bold; }
        .prize-qty .remaining { color: #4ecdc4; font-size: 16px; }
        .prize-qty .total { color: rgba(255,255,255,0.5); font-size: 13px; }
        .prize-qty.zero .remaining { color: #888; }

        /* 中奖记录 */
        .results {
            max-width: 1200px; margin: 15px auto 0; padding: 0 20px;
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
        }
        .result-card {
            background: rgba(139,0,0,0.6); border: 2px solid rgba(255,215,0,0.6);
            border-radius: 12px; padding: 15px 25px;
            animation: cardIn 0.5s ease; backdrop-filter: blur(5px);
            min-width: 280px; text-align: center;
        }
        .result-card h3 { color: #ffd700; font-size: 18px; margin-bottom: 8px; }
        .result-card .table-name { font-size: 28px; color: #fff; font-weight: bold; }
        .result-card .prize-line { font-size: 15px; color: #ffe4b5; margin-top: 4px; }
        .result-card .sponsor { font-size: 12px; color: rgba(255,255,255,0.5); }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 弹窗 */
        .popup-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .popup-content {
            background: linear-gradient(135deg, #8b0000, #b22222);
            border: 4px solid #ffd700; border-radius: 20px;
            padding: 35px 50px; text-align: center;
            animation: popIn 0.5s ease;
            box-shadow: 0 0 60px rgba(255,215,0,0.3); max-width: 90vw;
        }
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .popup-content h2 { font-size: 32px; color: #ffd700; margin-bottom: 12px; }
        .popup-content .big-table {
            font-size: 60px; color: #fff; font-weight: bold;
            margin: 10px 0; text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }
        .popup-content .prize-row {
            font-size: 22px; color: #ffe4b5; margin: 8px 0; padding: 8px 15px;
            background: rgba(0,0,0,0.2); border-radius: 10px;
        }
        .popup-content .prize-row .qty { color: #ffd700; font-weight: bold; font-size: 26px; }
        .popup-content .prize-row .sponsor-text { font-size: 14px; color: rgba(255,255,255,0.6); }
        .popup-content button {
            margin-top: 18px; padding: 12px 40px; font-size: 20px;
            background: linear-gradient(to bottom, #ffd700, #daa520);
            color: #8b0000; border: 2px solid #fff8dc; border-radius: 25px;
            cursor: pointer; font-weight: bold; font-family: inherit; letter-spacing: 3px;
        }
        .popup-content button:hover { transform: scale(1.05); }

        /* 彩花 */
        .confetti-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 999; overflow: hidden;
        }
        .confetti-piece {
            position: absolute; width: 10px; height: 10px; top: -10px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
        }
        .complete-msg {
            text-align: center; font-size: 26px; color: #ffd700; padding: 20px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5); animation: cardIn 0.5s ease; width: 100%;
        }
        .settings-bar {
            text-align: center; margin: 5px 0 8px;
        }
        .settings-bar label {
            color: #ffd700; font-size: 18px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }
        .settings-bar input[type="number"] {
            width: 60px; font-size: 18px; text-align: center;
            border: 2px solid rgba(255,215,0,0.5); border-radius: 8px;
            background: rgba(255,255,255,0.15); color: #ffd700;
            padding: 4px 8px; font-family: inherit;
        }
        .settings-bar input:disabled {
            opacity: 0.4; cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="title-section">
            <h1>幸运大转盘</h1>
            <p class="subtitle">第一轮 · 转三次抽三桌 · 每桌从3种奖品各抽若干共10份</p>
        </div>
        <div class="settings-bar" id="settingsBar">
            <label>参与桌数：<input type="number" id="tableCountInput" value="10" min="2" max="30" onchange="applyTableCount()"></label>
        </div>
        <div class="round-info" id="roundInfo">第 1 / 3 轮</div>

        <div class="wheels-container">
            <div class="wheel-section">
                <h2>桌号</h2>
                <div class="wheel-wrapper">
                    <div class="pointer"></div>
                    <canvas id="tableWheel" width="600" height="600"></canvas>
                </div>
            </div>
            <div class="wheel-section wheel-section-number">
                <h2>数量</h2>
                <div class="wheel-wrapper">
                    <div class="pointer pointer-small"></div>
                    <canvas id="numberWheel" width="220" height="220"></canvas>
                </div>
            </div>
            <div class="wheel-section">
                <h2>奖品</h2>
                <div class="wheel-wrapper">
                    <div class="pointer"></div>
                    <canvas id="prizeWheel" width="600" height="600"></canvas>
                </div>
            </div>
        </div>

        <div class="spin-prizes" id="spinPrizes"></div>

        <div class="btn-container">
            <button id="spinBtn" onclick="startSpin()">开始抽奖</button>
            <button id="resetBtn" onclick="resetAll()">重 置</button>
        </div>

        <div class="info-panel">
            <div class="info-box">
                <h3>参与抽奖桌号</h3>
                <div class="table-grid" id="tableGrid"></div>
            </div>
            <div class="info-box">
                <h3>奖品列表及剩余数量</h3>
                <ul class="prize-list" id="prizeList"></ul>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <div id="confettiContainer" class="confetti-container"></div>
    <div id="resultPopup" style="display:none;"></div>

    <script>
    // ============================================================
    //  配置区
    // ============================================================
    let TOTAL_TABLES = 10;
    let TOTAL_ROUNDS = 3;
    const PRIZES_PER_SPIN = 3;   // 每轮抽几种奖品
    const TOTAL_PER_TABLE = 10;  // 每桌总共获得几份
    const MIN_PER_PRIZE = 2;     // 每种奖品最少几份
    const MAX_PER_PRIZE = 5;     // 每种奖品最多几份

    let tables = Array.from({length: TOTAL_TABLES}, (_, i) => `第${i + 1}桌`);

    const prizes = [
        { short: 'NTUC voucher $10', full: 'NTUC voucher $10',                   sponsor: '华科校友尹希江',       qty: 10, remaining: 10 },
        { short: '民宿体验一晚',      full: '富力公主湾精品民宿体验一晚',             sponsor: '富力地产李明亮董事长',  qty: 10, remaining: 10 },
        { short: '歌剧院门票',        full: '富力公主湾歌剧院演出门票',              sponsor: '富力地产李明亮董事长',  qty: 10, remaining: 10 },
        { short: '中医经络体验券',     full: 'Star-7 Beauty 中医经络舒缓疗愈体验券',   sponsor: '武大梅慧彬校友',       qty: 10, remaining: 10 },
    ];

    let tableColors = Array.from({length: TOTAL_TABLES}, (_, i) =>
        `hsl(${Math.round(i * 360 / TOTAL_TABLES)}, 65%, 45%)`
    );
    const prizeColors = ['#c0392b','#e67e22','#27ae60','#2980b9'];
    const numberItems = [1, 2, 3, 4, 5];
    const numberLabels = numberItems.map(String);
    const numberColors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c'];

    // ============================================================
    //  状态
    // ============================================================
    let currentRound = 0;
    let spinning = false;
    let allResults = [];
    let usedTableIndices = new Set();

    // ============================================================
    //  工具函数
    // ============================================================
    const delay = ms => new Promise(r => setTimeout(r, ms));

    /** 将 total 份奖品随机分配给 n 组，每组 min~max */
    function distribute(total, maxArr) {
        const n = maxArr.length;
        for (let attempt = 0; attempt < 2000; attempt++) {
            const result = [];
            let rem = total;
            let ok = true;
            for (let i = 0; i < n - 1; i++) {
                const lo = Math.max(MIN_PER_PRIZE, rem - maxArr.slice(i + 1).reduce((a, b) => a + b, 0));
                const hi = Math.min(maxArr[i], rem - (n - 1 - i) * MIN_PER_PRIZE);
                if (lo > hi) { ok = false; break; }
                const v = lo + Math.floor(Math.random() * (hi - lo + 1));
                result.push(v);
                rem -= v;
            }
            if (ok && rem >= MIN_PER_PRIZE && rem <= maxArr[n - 1]) {
                result.push(rem);
                return result;
            }
        }
        // 回退：平均分配
        const base = Math.floor(total / n);
        const result = Array(n).fill(base);
        result[0] += total - base * n;
        return result;
    }

    /** 从可用奖品中随机选一个（排除 excludeSet） */
    function pickAvailablePrize(excludeSet) {
        const available = prizes
            .map((p, i) => ({ idx: i, remaining: p.remaining }))
            .filter(x => x.remaining >= MIN_PER_PRIZE && !excludeSet.has(x.idx));
        if (available.length === 0) return -1;
        return available[Math.floor(Math.random() * available.length)].idx;
    }

    // ============================================================
    //  信息面板
    // ============================================================
    function renderTableGrid() {
        document.getElementById('tableGrid').innerHTML = tables.map((t, i) =>
            `<span class="table-tag${usedTableIndices.has(i) ? ' used' : ''}">${t}</span>`
        ).join('');
    }
    function renderPrizeList() {
        document.getElementById('prizeList').innerHTML = prizes.map(p => {
            const exhausted = p.remaining <= 0;
            const zeroClass = exhausted ? ' zero' : '';
            return `<li class="prize-item${exhausted ? ' exhausted' : ''}">
                <span class="prize-label">${p.full} <span class="prize-sponsor">(${p.sponsor})</span></span>
                <span class="prize-qty${zeroClass}">
                    <span class="remaining">${p.remaining}</span>
                    <span class="total"> / ${p.qty}</span>
                </span>
            </li>`;
        }).join('');
    }
    renderTableGrid();
    renderPrizeList();

    // ============================================================
    //  转盘类
    // ============================================================
    class Wheel {
        constructor(canvasId, items, labels, colors) {
            this.canvas = document.getElementById(canvasId);
            this.ctx = this.canvas.getContext('2d');
            this.items = items;
            this.labels = labels;
            this.colors = colors;
            this.angle = 0;
            this.usedSet = new Set();
            this.highlightIdx = -1;
            this.draw();
        }
        get segAngle() { return (2 * Math.PI) / this.items.length; }

        available() {
            return this.items.map((_, i) => i).filter(i => !this.usedSet.has(i));
        }

        draw() {
            const ctx = this.ctx;
            const w = this.canvas.width, h = this.canvas.height;
            const cx = w / 2, cy = h / 2;
            const R = Math.min(cx, cy) - 18;
            const n = this.items.length;
            const seg = this.segAngle;

            ctx.clearRect(0, 0, w, h);

            // 外圈装饰
            const rimW = R * 0.05 + 4;   // proportional rim
            const dotR = R * 0.02 + 2;   // proportional dots
            const dotCount = Math.max(12, Math.round(R * 0.1));
            ctx.beginPath();
            ctx.arc(cx, cy, R + rimW, 0, Math.PI * 2);
            ctx.fillStyle = '#2c1810';
            ctx.fill();
            for (let i = 0; i < dotCount; i++) {
                const a = (i / dotCount) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(cx + (R + rimW) * Math.cos(a), cy + (R + rimW) * Math.sin(a), dotR, 0, Math.PI * 2);
                ctx.fillStyle = i % 2 === 0 ? '#ffd700' : '#ff4444';
                ctx.fill();
            }

            // 扇形
            for (let i = 0; i < n; i++) {
                const sa = this.angle + i * seg - Math.PI / 2;
                const ea = sa + seg;
                const used = this.usedSet.has(i);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, R, sa, ea);
                ctx.closePath();
                ctx.fillStyle = used ? '#555' : this.colors[i % this.colors.length];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 高亮选中
                if (this.highlightIdx === i) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, R, sa, ea);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(255,215,0,0.35)';
                    ctx.fill();
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.restore();
                }

                // 文字
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(sa + seg / 2);
                const fontSize = n > 8 ? 16 : 20;
                ctx.font = `bold ${fontSize}px "Microsoft YaHei","PingFang SC",sans-serif`;
                ctx.fillStyle = used ? '#999' : '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 4;
                ctx.fillText(this.labels[i], R * 0.62, 0);
                ctx.shadowBlur = 0;

                if (used) {
                    const tw = ctx.measureText(this.labels[i]).width;
                    ctx.strokeStyle = '#ff4444';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(R * 0.62 - tw / 2 - 8, 0);
                    ctx.lineTo(R * 0.62 + tw / 2 + 8, 0);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // 中心圆
            const centerR = R * 0.14 + 2;
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, centerR);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(1, '#e0d5c0');
            ctx.beginPath();
            ctx.arc(cx, cy, centerR, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = Math.max(2, R * 0.015);
            ctx.stroke();
            ctx.fillStyle = '#8b0000';
            const centerFontSize = Math.max(8, Math.round(centerR * 0.7));
            ctx.font = `bold ${centerFontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('LUCKY', cx, cy);
        }

        spin(targetIdx, duration) {
            return new Promise(resolve => {
                const seg = this.segAngle;
                const start = this.angle;
                const offset = (Math.random() - 0.5) * seg * 0.5;
                const target = -(targetIdx + 0.5) * seg + offset;
                let rot = ((target - start) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
                rot += (5 + Math.floor(Math.random() * 5)) * Math.PI * 2;
                const t0 = performance.now();
                const tick = (now) => {
                    const p = Math.min((now - t0) / duration, 1);
                    const ease = 1 - Math.pow(1 - p, 3);
                    this.angle = start + rot * ease;
                    this.draw();
                    if (p < 1) requestAnimationFrame(tick);
                    else { this.angle = start + rot; this.draw(); resolve(targetIdx); }
                };
                requestAnimationFrame(tick);
            });
        }

        markUsed(i) { this.usedSet.add(i); this.draw(); }

        updateItems(items, labels, colors) {
            this.items = items;
            this.labels = labels;
            this.colors = colors;
            this.usedSet = new Set();
            this.highlightIdx = -1;
            this.angle = 0;
            this.draw();
        }
    }

    // ============================================================
    //  初始化转盘
    // ============================================================
    const tableWheel = new Wheel('tableWheel', tables, tables, tableColors);
    const prizeWheel = new Wheel('prizeWheel', prizes, prizes.map(p => p.short), prizeColors);
    const numWheel = new Wheel('numberWheel', numberItems, numberLabels, numberColors);

    // ============================================================
    //  音效
    // ============================================================
    let audioCtx;
    function beep(freq, dur, type = 'triangle') {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(0.25, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        o.start(); o.stop(audioCtx.currentTime + dur);
    }
    function winSound() {
        [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.3), i * 120));
    }
    function tickSound() { beep(800, 0.08); }

    // ============================================================
    //  彩花
    // ============================================================
    function showConfetti() {
        const c = document.getElementById('confettiContainer');
        const colors = ['#ffd700','#ff4444','#4ecdc4','#ff9ff3','#54a0ff','#fff'];
        for (let i = 0; i < 100; i++) {
            const el = document.createElement('div');
            el.className = 'confetti-piece';
            el.style.left = Math.random() * 100 + '%';
            el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            el.style.width = (5 + Math.random() * 10) + 'px';
            el.style.height = (5 + Math.random() * 10) + 'px';
            el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            el.style.animationDuration = (2 + Math.random() * 2) + 's';
            el.style.animationDelay = (Math.random() * 0.8) + 's';
            c.appendChild(el);
        }
        setTimeout(() => { c.innerHTML = ''; }, 5000);
    }

    // ============================================================
    //  抽奖主逻辑：每轮抽1桌 + 3种奖品
    //  流程：桌号转盘 → (奖品转盘 → 数量转盘) ×3
    // ============================================================
    async function startSpin() {
        if (spinning || currentRound >= TOTAL_ROUNDS) return;
        spinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('tableCountInput').disabled = true;
        document.getElementById('spinPrizes').innerHTML = '';

        // --- Pre-determine all results to guarantee total = TOTAL_PER_TABLE ---
        const avT = tableWheel.available();
        const ti = avT[Math.floor(Math.random() * avT.length)];

        const excludeSet = new Set();
        const selectedPrizes = [];
        for (let i = 0; i < PRIZES_PER_SPIN; i++) {
            const pi = pickAvailablePrize(excludeSet);
            selectedPrizes.push(pi);
            excludeSet.add(pi);
        }

        const maxArr = selectedPrizes.map(pi => Math.min(MAX_PER_PRIZE, prizes[pi].remaining));
        const quantities = distribute(TOTAL_PER_TABLE, maxArr);

        // === Step 1: Spin table wheel alone ===
        await tableWheel.spin(ti, 4500);
        tableWheel.markUsed(ti);
        usedTableIndices.add(ti);
        tickSound();
        await delay(800);

        // === Steps 2–4: For each prize, spin prize wheel FIRST, then number wheel ===
        const savedPrizeUsed = new Set(prizeWheel.usedSet);
        let remaining = TOTAL_PER_TABLE;
        for (let k = 0; k < PRIZES_PER_SPIN; k++) {
            const pi = selectedPrizes[k];
            const q = quantities[k];

            // Clear previous highlight
            prizeWheel.highlightIdx = -1;
            prizeWheel.draw();

            // Spin prize wheel — audience sees which prize
            await prizeWheel.spin(pi, 4000 - k * 400);
            tickSound();
            prizeWheel.highlightIdx = pi;
            prizeWheel.draw();
            await delay(500);

            // Number wheel max = remaining stock of the selected prize
            const maxQ = prizes[pi].remaining;
            const numRange = Array.from({length: maxQ}, (_, i) => i + 1);
            numWheel.updateItems(numRange, numRange.map(String), numberColors);

            // Spin number wheel — audience sees how many
            await numWheel.spin(q - 1, 3000 - k * 300);
            tickSound();

            remaining -= q;
            addSpinPrizeTag(prizes[pi].short + ' ×' + q);
            prizeWheel.markUsed(pi);

            if (k < PRIZES_PER_SPIN - 1) await delay(800);
        }

        await delay(400);
        prizeWheel.usedSet = savedPrizeUsed;
        prizeWheel.highlightIdx = -1;
        prizeWheel.draw();

        // Deduct prize remaining quantities
        selectedPrizes.forEach((pi, k) => {
            prizes[pi].remaining -= quantities[k];
            if (prizes[pi].remaining <= 0) prizeWheel.markUsed(pi);
        });

        renderTableGrid();
        renderPrizeList();
        winSound();
        showConfetti();

        currentRound++;
        const res = {
            round: currentRound,
            table: tables[ti],
            items: selectedPrizes.map((pi, k) => ({
                prize: prizes[pi],
                count: quantities[k]
            }))
        };
        allResults.push(res);
        showPopup(res);

        if (currentRound < TOTAL_ROUNDS) {
            document.getElementById('roundInfo').textContent = `第 ${currentRound + 1} / ${TOTAL_ROUNDS} 轮`;
        } else {
            document.getElementById('roundInfo').textContent = '🎊 抽奖完毕 🎊';
        }
    }

    function addSpinPrizeTag(text) {
        const tag = document.createElement('span');
        tag.className = 'spin-prize-tag';
        tag.textContent = '✓ ' + text;
        document.getElementById('spinPrizes').appendChild(tag);
    }

    // ============================================================
    //  弹窗
    // ============================================================
    function showPopup(res) {
        const el = document.getElementById('resultPopup');
        el.className = 'popup-overlay';
        el.style.display = 'flex';
        const prizeRows = res.items.map(item =>
            `<div class="prize-row">
                ${item.prize.full} × <span class="qty">${item.count}</span>
                <br><span class="sponsor-text">赞助：${item.prize.sponsor}</span>
            </div>`
        ).join('');
        el.innerHTML = `
            <div class="popup-content">
                <h2>🎊 第 ${res.round} 轮中奖 🎊</h2>
                <div class="big-table">${res.table}</div>
                ${prizeRows}
                <p style="color:#ffd700;margin-top:12px;font-size:20px;">共 ${TOTAL_PER_TABLE} 份，整桌嘉宾每人一份！</p>
                <button onclick="closePopup()">确 定</button>
            </div>
        `;
    }

    function closePopup() {
        document.getElementById('resultPopup').style.display = 'none';
        document.getElementById('spinPrizes').innerHTML = '';

        const r = allResults[allResults.length - 1];
        const card = document.createElement('div');
        card.className = 'result-card';
        const lines = r.items.map(item =>
            `<div class="prize-line">${item.prize.full} × ${item.count}</div>
             <div class="sponsor">赞助：${item.prize.sponsor}</div>`
        ).join('');
        card.innerHTML = `
            <h3>第 ${r.round} 轮</h3>
            <div class="table-name">${r.table}</div>
            ${lines}
        `;
        document.getElementById('results').appendChild(card);

        spinning = false;
        if (currentRound < TOTAL_ROUNDS) {
            document.getElementById('spinBtn').disabled = false;
        } else {
            document.getElementById('spinBtn').textContent = '抽奖结束';
            const msg = document.createElement('div');
            msg.className = 'complete-msg';
            msg.textContent = '🎉 第一轮幸运大转盘抽奖圆满结束！🎉';
            document.getElementById('results').appendChild(msg);
        }
    }

    // ============================================================
    //  重置
    // ============================================================
    function applyTableCount() {
        if (spinning || currentRound > 0) return;
        const input = document.getElementById('tableCountInput');
        const n = parseInt(input.value);
        if (isNaN(n) || n < 2) { input.value = TOTAL_TABLES; return; }
        TOTAL_TABLES = n;
        if (TOTAL_ROUNDS > TOTAL_TABLES) TOTAL_ROUNDS = TOTAL_TABLES;
        tables = Array.from({length: TOTAL_TABLES}, (_, i) => `第${i + 1}桌`);
        tableColors = Array.from({length: TOTAL_TABLES}, (_, i) =>
            `hsl(${Math.round(i * 360 / TOTAL_TABLES)}, 65%, 45%)`
        );
        tableWheel.updateItems(tables, tables, tableColors);
        usedTableIndices.clear();
        document.getElementById('roundInfo').textContent = `第 1 / ${TOTAL_ROUNDS} 轮`;
        renderTableGrid();
    }

    function resetAll() {
        if (spinning) return;
        currentRound = 0;
        allResults = [];
        usedTableIndices.clear();
        prizes.forEach(p => { p.remaining = p.qty; });
        tableWheel.usedSet.clear(); tableWheel.angle = 0; tableWheel.highlightIdx = -1; tableWheel.draw();
        prizeWheel.usedSet.clear(); prizeWheel.angle = 0; prizeWheel.highlightIdx = -1; prizeWheel.draw();
        numWheel.updateItems(numberItems, numberLabels, numberColors);
        document.getElementById('roundInfo').textContent = `第 1 / ${TOTAL_ROUNDS} 轮`;
        document.getElementById('spinBtn').textContent = '开始抽奖';
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('tableCountInput').disabled = false;
        document.getElementById('tableCountInput').value = TOTAL_TABLES;
        document.getElementById('results').innerHTML = '';
        document.getElementById('spinPrizes').innerHTML = '';
        renderTableGrid();
        renderPrizeList();
    }
    </script>
</body>
</html>
