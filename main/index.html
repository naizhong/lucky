  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse at 20% 50%,rgba(180,0,0,.15) 0%,transparent 60%),
                radial-gradient(ellipse at 80% 20%,rgba(255,180,0,.1) 0%,transparent 50%),
                radial-gradient(ellipse at 60% 80%,rgba(180,0,0,.1) 0%,transparent 50%);
  }
  #fwCanvas { position:fixed; inset:0; pointer-events:none; z-index:50; }
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star { position:absolute; width:2px; height:2px; background:white; border-radius:50%; animation:twinkle var(--d) ease-in-out infinite; opacity:var(--o); }
  @keyframes twinkle { 0%,100%{opacity:var(--o)} 50%{opacity:.05} }

  /* Lanterns */
  .lanterns { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-around; padding:0 40px; z-index:1; pointer-events:none; }
  .lantern { display:flex; flex-direction:column; align-items:center; animation:swing 3s ease-in-out infinite; transform-origin:top center; }
  .lantern:nth-child(2){animation-delay:-1s} .lantern:nth-child(3){animation-delay:-2s} .lantern:nth-child(4){animation-delay:-.5s}
  @keyframes swing { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
  .lantern-string{width:2px;height:30px;background:linear-gradient(to bottom,#888,var(--gold))}
  .lantern-body{width:36px;height:50px;background:radial-gradient(ellipse at 40% 40%,#ff6600,#cc0000,#880000);border-radius:50% 50% 40% 40%/40% 40% 50% 50%;box-shadow:0 0 20px rgba(255,100,0,.8),0 0 40px rgba(255,50,0,.4);border:1px solid rgba(255,200,0,.5)}
  .lantern-top,.lantern-bottom{width:44px;height:8px;background:linear-gradient(to right,#aa8800,var(--gold),#aa8800);border-radius:4px;margin:0 -4px}
  .lantern-tassel{width:2px;height:20px;background:linear-gradient(to bottom,var(--gold),transparent)}

  /* Full-screen overlay */
  .winner-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(0,0,0,.88); backdrop-filter:blur(10px); cursor:pointer;
  }
  .winner-overlay.show { display:flex; animation:overlayIn .5s ease-out; }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }
  .overlay-glow {
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center,rgba(255,80,0,.25) 0%,transparent 65%);
    animation:glowPulse 1.5s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }
  .overlay-round { color:rgba(255,240,180,1); font-size:.85rem; letter-spacing:8px; margin-bottom:20px; animation:fadeUp .6s ease-out .2s both; }
  .overlay-name {
    font-size:clamp(3.5rem,11vw,8.5rem); font-weight:900; color:white;
    letter-spacing:8px; text-align:center; padding:0 40px; line-height:1.1;
    text-shadow:0 0 60px var(--gold),0 0 120px rgba(255,150,0,.8),0 4px 30px rgba(0,0,0,.5);
    animation:nameReveal .8s cubic-bezier(.34,1.56,.64,1) .1s both;
  }
  @keyframes nameReveal { from{opacity:0;transform:scale(.4) translateY(40px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .overlay-congrats { color:var(--gold); font-size:clamp(.95rem,2.5vw,1.4rem); letter-spacing:6px; margin-top:24px; animation:fadeUp .6s ease-out .5s both; }
  .overlay-dismiss { margin-top:36px; color:rgba(255,255,255,.75); font-size:.75rem; letter-spacing:4px; animation:fadeUp .6s ease-out 1.5s both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* Layout */
  .container { position:relative; z-index:2; max-width:1100px; margin:0 auto; padding:10% 30px 40px; }

  /* Editable title */
  .title-wrap { text-align:center; margin-bottom:6px; position:relative; }
  h1 {
    font-family:'Bebas Neue',cursive; font-size:clamp(3rem,8vw,6rem);
    letter-spacing:8px; cursor:text; display:inline-block; outline:none;
    background:linear-gradient(135deg,#aa7700,var(--gold),#fff8dc,var(--gold),#aa7700);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 0 20px rgba(255,200,0,.5));
    border-bottom:2px dashed transparent; transition:border-color .3s; padding-bottom:4px;
  }
  h1:hover { border-bottom-color:rgba(255,215,0,.35); }
  h1:focus { border-bottom-color:rgba(255,215,0,.8); }
  .edit-hint { position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:.7rem; color:rgba(255,215,0,.65); letter-spacing:2px; pointer-events:none; transition:color .3s; }
  .title-wrap:hover .edit-hint { color:rgba(255,215,0,.9); }
  .subtitle { text-align:center; color:rgba(255,230,120,1); font-size:1rem; letter-spacing:6px; margin-bottom:50px; outline:none; cursor:text; display:inline-block; border-bottom:1px dashed transparent; transition:border-color .3s; }
  .subtitle:hover { border-bottom-color:rgba(255,215,0,.3); }
  .subtitle:focus { border-bottom-color:rgba(255,215,0,.7); }

  .main-grid { display:grid; grid-template-columns:1fr 340px; gap:30px; align-items:start; }
  .draw-area { display:flex; flex-direction:column; align-items:center; gap:30px; }

  /* Winner display box */
  .winner-display {
    width:100%; min-height:240px;
    border:2px solid rgba(255,215,0,.25); border-radius:16px;
    background:rgba(255,215,0,.03);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden; transition:border-color .4s, box-shadow .4s;
  }
  .winner-display.active { border-color:rgba(255,215,0,.75); box-shadow:0 0 50px rgba(255,215,0,.12),inset 0 0 40px rgba(255,100,0,.06); }
  .winner-display::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,215,0,.018) 20px,rgba(255,215,0,.018) 21px); }

  .reel-wrap { position:relative; width:100%; padding:20px; display:flex; flex-direction:column; align-items:center; min-height:150px; justify-content:center; }
  .reel-wrap::before,.reel-wrap::after { content:''; position:absolute; left:0; right:0; height:45px; z-index:2; pointer-events:none; }
  .reel-wrap::before { top:0; background:linear-gradient(to bottom,rgba(216,0,3,.25),transparent); }
  .reel-wrap::after { bottom:0; background:linear-gradient(to top,rgba(246,0,3,.25),transparent); }

  .rolling-name {
    font-size:clamp(2.5rem,5vw,4.2rem); font-weight:900; color:var(--gold);
    text-align:center; letter-spacing:4px;
    text-shadow:0 0 30px rgba(255,215,0,.8); position:relative; z-index:1; line-height:1.2;
    transition:color .1s;
  }
  .rolling-name.idle { color:rgba(255,230,120,.75); font-size:1.1rem; letter-spacing:8px; text-shadow:none; font-weight:400; }
  .rolling-name.slowing { color:#fff; text-shadow:0 0 60px var(--gold),0 0 120px rgba(255,150,0,.6); }
  .winner-label { font-size:.75rem; letter-spacing:6px; color:rgba(255,230,120,.85); text-transform:uppercase; margin-bottom:10px; z-index:1; }

  /* Buttons */
  .btn-draw {
    font-family:'Bebas Neue',cursive; font-size:1.8rem; letter-spacing:6px;
    padding:18px 60px;
    background:linear-gradient(135deg,#8B0000,var(--red),#cc3300);
    border:2px solid rgba(255,215,0,.5); color:var(--gold); border-radius:50px;
    cursor:pointer; transition:all .3s;
    box-shadow:0 0 30px rgba(200,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);
    position:relative; overflow:hidden;
  }
  .btn-draw::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.12) 50%,transparent 60%); transform:translateX(-100%); transition:transform .5s; }
  .btn-draw:hover::after { transform:translateX(100%); }
  .btn-draw:hover { transform:translateY(-3px); box-shadow:0 10px 45px rgba(200,0,0,.7); border-color:var(--gold); }
  .btn-draw:active { transform:translateY(0); }
  .btn-stop {
    background:linear-gradient(135deg,#1a4a1a,#2d7a2d,#1a4a1a);
    border-color:rgba(100,255,100,.4); color:#90ff90;
    animation:stopPulse .8s ease-in-out infinite;
  }
  @keyframes stopPulse { 0%,100%{box-shadow:0 0 30px rgba(0,200,0,.4)} 50%{box-shadow:0 0 55px rgba(0,255,0,.75)} }

  /* Settings */
  .settings-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .settings-row label { color:rgba(255,230,120,.95); font-size:.8rem; letter-spacing:3px; }
  .settings-row input[type=number] { width:60px; background:rgba(0,0,0,.4); border:1px solid rgba(255,215,0,.3); border-radius:6px; color:var(--gold); font-family:'Bebas Neue',cursive; font-size:1.1rem; padding:6px 10px; text-align:center; outline:none; }
  .checkbox-label { display:flex; align-items:center; gap:6px; color:rgba(255,230,120,.95); font-size:.8rem; letter-spacing:2px; cursor:pointer; }
  input[type=checkbox] { accent-color:var(--gold); width:14px; height:14px; }

  /* Panel */
  .panel { background:rgba(255,215,0,.04); border:1px solid rgba(255,215,0,.15); border-radius:16px; padding:24px; }
  .panel h3 { color:var(--gold); font-size:.85rem; letter-spacing:5px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .panel h3::after { content:''; flex:1; height:1px; background:rgba(255,215,0,.2); }
  .count-badge { background:rgba(255,215,0,.15); color:var(--gold); font-size:.75rem; padding:2px 8px; border-radius:20px; font-family:'Bebas Neue',cursive; letter-spacing:2px; }
  textarea { width:100%; min-height:175px; background:rgba(0,0,0,.05); border:1px solid rgba(255,215,0,.2); border-radius:10px; color:rgba(255,255,255,.85); font-family:'Noto Serif SC',serif; font-size:.9rem; padding:14px; resize:vertical; outline:none; line-height:1.8; transition:border-color .3s; }
  textarea:focus { border-color:rgba(255,215,0,.5); }
  textarea::placeholder { color:rgba(255,255,255,.5); }
  .btn-row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .btn-small { font-family:'Noto Serif SC',serif; font-size:.78rem; padding:7px 14px; background:transparent; border:1px solid rgba(255,215,0,.3); color:rgba(255,215,0,.7); border-radius:6px; cursor:pointer; transition:all .2s; letter-spacing:2px; }
  .btn-small:hover { background:rgba(255,215,0,.1); border-color:rgba(255,215,0,.6); color:var(--gold); }
  .btn-import { border-color:rgba(100,200,255,.4) !important; color:rgba(100,200,255,.85) !important; }
  .btn-import:hover { background:rgba(100,200,255,.1) !important; color:#80dfff !important; }
  #fileInput { display:none; }
  .import-feedback { font-size:.75rem; color:rgba(100,255,150,.8); letter-spacing:2px; margin-top:7px; min-height:18px; }

  /* Winners log */
  .winner-entry { display:flex; align-items:center; gap:10px; padding:8px 12px; margin-bottom:6px; background:rgba(255,215,0,.06); border-radius:8px; border-left:3px solid var(--gold); animation:slideIn .4s ease-out; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .winner-entry .num { font-family:'Bebas Neue',cursive; color:rgba(255,230,120,.9); font-size:.85rem; min-width:20px; }
  .winner-entry .name { color:var(--gold); font-size:.95rem; flex:1; }
  .winner-entry .round-badge { font-size:.7rem; color:rgba(255,100,0,.8); letter-spacing:1px; }

  @media(max-width:768px) { .main-grid{grid-template-columns:1fr} .lanterns{display:none} }
</style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<div class="stars" id="stars"></div>

<div class="lanterns">
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tassel"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tassel"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tassel"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tassel"></div></div>
</div>

<!-- Full-screen winner reveal -->
<div class="winner-overlay" id="winnerOverlay" onclick="closeOverlay()">
  <div class="overlay-glow"></div>
  <div class="overlay-round" id="overlayRound">第 1 轮</div>
  <div class="overlay-name" id="overlayName"></div>
  <div class="overlay-congrats">🎉 恭喜中奖！CONGRATULATIONS！🎉</div>
  <div class="overlay-dismiss">— 点击任意处关闭 —</div>
</div>

<div class="container">
  <div class="title-wrap">
    <h1 id="mainTitle" contenteditable="true" spellcheck="false">LUCKY DRAW</h1>
    <span class="edit-hint">✏ 点击编辑标题</span>
  </div>
  <div style="text-align:center">
    <div class="subtitle" id="subtitle" contenteditable="true" spellcheck="false">幸 运 抽 奖</div>
  </div>

  <div class="main-grid">
    <div class="draw-area">
      <div class="winner-display" id="winnerDisplay">
        <div class="winner-label" id="winnerLabel">等待抽奖 · WAITING</div>
        <div class="reel-wrap">
          <div class="rolling-name idle" id="rollingName">点击开始抽奖</div>
        </div>
      </div>

      <div class="settings-row">
        <label>每次抽取</label>
        <input type="number" id="drawCount" value="1" min="1" max="10">
        <label>名</label>
        <label class="checkbox-label">
          <input type="checkbox" id="removeWinner" checked>
          中奖后移出
        </label>
      </div>

      <button class="btn-draw" id="drawBtn" onclick="startDraw()">🎰 开始抽奖</button>
    </div>
    <div class="panel" id="winnersPanel" style="display:none;margin-top:20px">
      <h3>中奖名单</h3>
      <div id="winnersList"></div>
    </div>

    <div>
      <div class="panel">
        <h3>参与名单 <span class="count-badge" id="countBadge">0 人</span></h3>
        <textarea id="nameInput" placeholder="输入参与者名单&#10;每行一个名字&#10;&#10;例如：&#10;张三&#10;李四&#10;Alice&#10;Bob"></textarea>
        <div class="import-feedback" id="importFeedback"></div>
        <div class="btn-row">
          <button class="btn-small btn-import" onclick="document.getElementById('fileInput').click()">📂 导入 TXT / CSV</button>
          <input type="file" id="fileInput" accept=".txt,.csv" onchange="importFile(event)">
          <button class="btn-small" onclick="loadSample()">示例名单</button>
          <button class="btn-small" onclick="clearNames()">清空</button>
          <button class="btn-small" onclick="clearWinners()">重置中奖</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Stars ──────────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 140; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--o:${.15+Math.random()*.6}`;
  starsEl.appendChild(s);
}

// ── Canvas Fireworks ───────────────────────────────────────────
const canvas = document.getElementById('fwCanvas');
const ctx = canvas.getContext('2d');
let particles = [], animFrame = null;

function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2, spd = 1.5 + Math.random() * 9;
    this.vx = Math.cos(a) * spd; this.vy = Math.sin(a) * spd - 2.5;
    this.gravity = 0.13; this.drag = 0.972;
    this.color = color; this.alpha = 1;
    this.decay = 0.011 + Math.random() * 0.009;
    this.size = 2 + Math.random() * 3.5;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y, a: this.alpha});
    if (this.trail.length > 7) this.trail.shift();
    this.vx *= this.drag; this.vy *= this.drag; this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
  }
  draw() {
    this.trail.forEach((t, i) => {
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * (i / this.trail.length) * 0.65, 0, Math.PI * 2);
      ctx.fillStyle = this.color.replace(',1)', `,${t.a * (i / this.trail.length) * 0.45})`);
      ctx.fill();
    });
    ctx.shadowBlur = 10; ctx.shadowColor = this.color.replace(',1)', ',.9)');
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace(',1)', `,${this.alpha})`);
    ctx.fill(); ctx.shadowBlur = 0;
  }
}

function launchFirework(x, y) {
  const palettes = [
    ['rgba(255,215,0,1)','rgba(255,165,0,1)','rgba(255,255,180,1)'],
    ['rgba(255,80,80,1)', 'rgba(255,150,50,1)','rgba(255,255,100,1)'],
    ['rgba(100,200,255,1)','rgba(200,100,255,1)','rgba(255,255,255,1)'],
    ['rgba(100,255,150,1)','rgba(255,215,0,1)', 'rgba(255,120,200,1)'],
  ];
  const p = palettes[Math.floor(Math.random() * palettes.length)];
  for (let i = 0; i < 70 + Math.random() * 40; i++)
    particles.push(new Particle(x, y, p[Math.floor(Math.random() * p.length)]));
}

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.01);
  particles.forEach(p => { p.update(); p.draw(); });
  if (particles.length > 0) animFrame = requestAnimationFrame(animLoop);
  else { ctx.clearRect(0, 0, canvas.width, canvas.height); animFrame = null; }
}

function shootFireworks(n = 3) {
  if (animFrame) cancelAnimationFrame(animFrame);
  for (let i = 0; i < n; i++)
    setTimeout(() => launchFirework(canvas.width * (.1 + Math.random() * .8), canvas.height * (.05 + Math.random() * .5)), i * 220);
  animLoop();
}

// ── Confetti ───────────────────────────────────────────────────
function confetti() {
  const cols = ['#FFD700','#FF4444','#FF8C00','#FFF','#FF69B4','#00FF88','#FF6B35','#80DFFF'];
  for (let i = 0; i < 130; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      const sz = 6 + Math.random() * 10;
      el.style.cssText = `position:fixed;pointer-events:none;z-index:150;
        left:${Math.random()*100}vw;top:-14px;
        width:${sz}px;height:${sz}px;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        border-radius:${Math.random()>.4?'50%':'3px'};
        animation:cFall ${2.5+Math.random()*2.5}s linear ${Math.random()*.8}s forwards;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }, i * 14);
  }
}
const cfStyle = document.createElement('style');
cfStyle.textContent = `@keyframes cFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}`;
document.head.appendChild(cfStyle);

// ── Name list ──────────────────────────────────────────────────
let rolling=false, rollTo=null, winners=[], availableNames=[], roundCount=0;

const nameInput = document.getElementById('nameInput');
nameInput.addEventListener('input', updateCount);

function getNames() { return nameInput.value.split('\n').map(n=>n.trim()).filter(Boolean); }
function updateCount() { document.getElementById('countBadge').textContent = getNames().length + ' 人'; }
function loadSample() {
  nameInput.value='张伟\n李娜\n王芳\n刘洋\nAlice Tan\nBob Lim\nCindy Wong\nDavid Chen\nEmily Ng\nFrank Wu\nGrace Zhou';
  updateCount();
}
function clearNames() { nameInput.value=''; updateCount(); }
function clearWinners() {
  winners=[]; roundCount=0;
  document.getElementById('winnersList').innerHTML='';
  document.getElementById('winnersPanel').style.display='none';
  document.getElementById('rollingName').textContent='点击开始抽奖';
  document.getElementById('rollingName').className='rolling-name idle';
  document.getElementById('winnerLabel').textContent='等待抽奖 · WAITING';
  document.getElementById('winnerDisplay').classList.remove('active');
}

// ── File import ────────────────────────────────────────────────
function importFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    let text = ev.target.result;
    if (file.name.endsWith('.csv'))
      text = text.split('\n').map(r => r.split(',')[0].replace(/^"|"$/g,'').trim()).join('\n');
    const names = text.split('\n').map(n=>n.trim()).filter(Boolean);
    nameInput.value = names.join('\n'); updateCount();
    const fb = document.getElementById('importFeedback');
    fb.textContent = `✓ 已导入 ${names.length} 个名字`;
    setTimeout(() => fb.textContent = '', 3500);
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

// ── Draw ───────────────────────────────────────────────────────
function startDraw() {
  const all = getNames();
  if (!all.length) { alert('请先输入参与者名单！'); return; }
  const rm = document.getElementById('removeWinner').checked;
  const cnt = parseInt(document.getElementById('drawCount').value) || 1;
  availableNames = rm ? all.filter(n => !winners.map(w=>w.name).includes(n)) : [...all];
  if (!availableNames.length) { alert('所有人都已中奖！请重置。'); return; }
  if (availableNames.length < cnt) { alert(`剩余参与者不足 ${cnt} 名！`); return; }

  rolling = true;
  document.getElementById('drawBtn').textContent = '⏹ 停止';
  document.getElementById('drawBtn').className = 'btn-draw btn-stop';
  document.getElementById('drawBtn').onclick = stopDraw;
  const el = document.getElementById('rollingName');
  el.className = 'rolling-name';
  document.getElementById('winnerLabel').textContent = '抽奖进行中 · DRAWING...';
  document.getElementById('winnerDisplay').classList.add('active');

  let speed = 38;
  function loop() {
    if (!rolling) return;
    el.textContent = availableNames[Math.floor(Math.random() * availableNames.length)];
    el.style.transform = `scale(${.94 + Math.random()*.12}) translateY(${(Math.random()-.5)*6}px)`;
    setTimeout(() => el.style.transform='scale(1) translateY(0)', speed * .35);
    rollTo = setTimeout(loop, speed);
  }
  loop();
}

function stopDraw() {
  rolling = false; clearTimeout(rollTo);
  const cnt = parseInt(document.getElementById('drawCount').value) || 1;
  const drawn = [...availableNames].sort(() => Math.random()-.5).slice(0, cnt);
  const el = document.getElementById('rollingName');
  el.className = 'rolling-name slowing';

  // Deceleration
  let steps = 3, delay = 30;
  function decel(s) {
    if (s <= 0) {
      el.textContent = drawn.join('  ·  ');
      el.className = 'rolling-name';
      el.style.transform = 'scale(1) translateY(0)';
      finish(drawn); return;
    }
    el.textContent = availableNames[Math.floor(Math.random()*availableNames.length)];
    el.style.transform = `scale(${1 + (steps-s)*0.004})`;
    delay += 28;
    setTimeout(() => decel(s - 1), delay);
  }
  decel(steps);
}

function finish(drawn) {
  roundCount++;
  drawn.forEach(n => winners.push({name:n, round:roundCount}));
  document.getElementById('winnerLabel').textContent = `第 ${roundCount} 轮中奖`;
  document.getElementById('winnerDisplay').classList.remove('active');

  // Full-screen reveal
  document.getElementById('overlayName').textContent = drawn.join('  ·  ');
  document.getElementById('overlayRound').textContent = `第 ${roundCount} 轮`;
  document.getElementById('winnerOverlay').classList.add('show');

  drawn.forEach(n => logWinner(n, roundCount));
  shootFireworks(3);
  confetti();

  document.getElementById('drawBtn').textContent = '🎰 再次抽奖';
  document.getElementById('drawBtn').className = 'btn-draw';
  document.getElementById('drawBtn').onclick = startDraw;
}

function closeOverlay() { document.getElementById('winnerOverlay').classList.remove('show'); }

function logWinner(name, round) {
  document.getElementById('winnersPanel').style.display = 'block';
  const list = document.getElementById('winnersList');
  const entry = document.createElement('div');
  entry.className = 'winner-entry';
  entry.innerHTML = `<span class="num">${winners.length}</span><span class="name">${name}</span><span class="round-badge">第${round}轮</span>`;
  list.insertBefore(entry, list.firstChild);
}

// ── Editable title ─────────────────────────────────────────────
['mainTitle','subtitle'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
  });
});

updateCount();
</script>
</body>
